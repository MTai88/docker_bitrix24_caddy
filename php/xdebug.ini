; =============================================================
; Xdebug 3.x для Bitrix24 — настройки
; =============================================================
; По умолчанию Xdebug ВЫКЛЮЧЕН (xdebug.mode=off). Включается:
;   1) через переменную окружения XDEBUG_ENABLE=1 в .env
;   2) или query-параметром XDEBUG_SESSION=1 (при trigger-режиме)
;
; В IDE (PHPStorm/VSCode) слушать порт 9003 — это стандарт Xdebug 3.
; В контейнере Xdebug подключается к IDE через host.docker.internal
; (на Windows/macOS Docker Desktop уже прописывает этот hostname).

[xdebug]
; Режим работы (develop, debug, coverage, trace, profile).
; По умолчанию выключен, чтобы не тормозить обычные запросы.
xdebug.mode=${XDEBUG_MODE:-off}

; Адрес IDE — на хосте. В Docker Desktop `host.docker.internal` уже резолвится.
xdebug.client_host=${XDEBUG_CLIENT_HOST:-host.docker.internal}
xdebug.client_port=${XDEBUG_CLIENT_PORT:-9003}

; При trigger-режиме включается через cookie/GET XDEBUG_SESSION
; (полезно для отладки конкретного запроса, не всех подряд).
xdebug.start_with_request=${XDEBUG_START_WITH_REQUEST:-trigger}

; Длинные переменные в trace-протоколе
xdebug.var_display_max_depth=5
xdebug.var_display_max_children=256
xdebug.var_display_max_data=2048

; Путь к логам Xdebug (для отладки проблем с подключением)
xdebug.log=/var/log/php/xdebug.log
xdebug.log_level=0
