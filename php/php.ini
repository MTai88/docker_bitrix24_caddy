; =============================================================
; PHP-конфигурация под Bitrix24
; Монтируется в /usr/local/etc/php/conf.d/99-bitrix.ini
; =============================================================

memory_limit = ${PHP_MEMORY_LIMIT:-512M}
max_execution_time = ${PHP_MAX_EXECUTION_TIME:-300}
max_input_time = 300
upload_max_filesize = ${PHP_UPLOAD_MAX_FILESIZE:-128M}
post_max_size = ${PHP_POST_MAX_SIZE:-128M}
max_input_vars = 10000
date.timezone = ${TZ:-Europe/Moscow}

; Bitrix рекомендует short_open_tag = Off, но legacy-код встречается — оставим Off
short_open_tag = On

; Реальные пути под Bitrix
session.save_path = "/var/www/html/cache/sessions"
upload_tmp_dir = "/var/www/html/cache/upload"
soap.wsdl_cache_dir = "/var/www/html/cache/wsdl"
opcache.file_cache = "/var/www/html/cache/opcache"

; =============================================================
; Логи PHP и ошибок
; =============================================================
; Каталог /var/log/php смонтирован на хост в ./logs/php (см. docker-compose.yml)
log_errors = On
error_log = "/var/log/php/error.log"
; Уровень логирования: всё, кроме deprecated
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
; На проде ошибки не показываем в браузере
display_errors = Off
display_startup_errors = Off
log_errors_max_len = 4096
ignore_repeated_errors = Off

; =============================================================
; Разное
; =============================================================
; mbstring
mbstring.func_overload = 0
mbstring.internal_encoding = "UTF-8"

; Не светить версию PHP в заголовках
expose_php = Off

; Bitrix обычно требует allow_url_fopen
allow_url_fopen = On
allow_url_include = Off

; Совместимость с long-running процессами
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; Совместимость с большими файлами (Bitrix upload/backup)
memory_limit = ${PHP_MEMORY_LIMIT:-512M}

; =============================================================
; OPcache — критично для производительности Bitrix (много мелких PHP-файлов)
; =============================================================
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 2
opcache.validate_timestamps = 1
opcache.fast_shutdown = 1
opcache.save_comments = 1
opcache.use_cwd = 1
