# =============================================================
# Docker Compose для Bitrix24 (PHP 8.3-FPM + Caddy + MySQL)
# =============================================================
# Запуск:
#   docker compose up -d --build
#
# Чтобы добавить PostgreSQL (опционально), запустите с профилем:
#   docker compose --profile postgres up -d
#
# После старта откройте https://${DOMAIN} (или http для LOCAL_DEV=true)
# Чтобы Bitrix увидел push-сервер при установке, указывайте адрес:
#   http://caddy/bitrix/sub/
# (внутри docker-сети Caddy проксирует запросы в push-server)
#
# ---- Несколько стеков на одном хосте ----
# Все контейнеры, сеть и volume не имеют жёстко зашитых имён — Compose
# использует префикс из COMPOSE_PROJECT_NAME (см. .env.example).
# Чтобы поднять второй такой же стек в соседней папке:
#   1) скопировать каталог;
#   2) в новом .env задать COMPOSE_PROJECT_NAME=other_bitrix (другое!);
#   3) при необходимости разнести HTTP_PORT/HTTPS_PORT/MYSQL_PORT и т.д.
# Подробнее: docs/clone-stack.md
# =============================================================

services:

  # ---------- Caddy (reverse proxy + auto HTTPS) ----------
  caddy:
    image: caddy:2-alpine
    # container_name убран намеренно: имя даёт Compose с префиксом проекта,
    # чтобы можно было держать несколько стеков рядом без коллизий.
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # сайт из хоста пробрасывается в тот же путь, что видит php
      - ./www:/var/www/html:ro
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      php:
        condition: service_started
      push-server:
        condition: service_started
      push-server-sub:
        condition: service_started
    networks:
      - bitrix-network

  # ---------- PHP-FPM 8.3 с расширениями под Bitrix24 ----------
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    image: bitrix-php:8.3
    # pull_policy: build — образ локальный (билдим из ./php/Dockerfile),
    # в Docker Hub его нет. Без этой строки Compose пытается сделать
    # `docker pull bitrix-php:8.3` и валится с "manifest unknown".
    pull_policy: build
    # container_name убран: имя даёт Compose с префиксом проекта.
    restart: unless-stopped
    # Под каким uid/gid работают воркеры FPM и entrypoint.
    # Совпадает с владельцем bind-mount ./www (на хосте — WSL-юзер dev,
    # uid 1000), иначе PHP не сможет писать сессии/загруженные файлы.
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    volumes:
      - ./www:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/99-bitrix.ini:ro
      - ./php/xdebug.ini:/usr/local/etc/php/conf.d/98-xdebug.ini:ro
      # Логи PHP (error_log) и Xdebug — наружу, чтобы смотреть без exec
      - ./logs/php:/var/log/php
      # Служебные кеши PHP (sessions, upload_tmp, wsdl, opcache) —
      # в именованном volume, не в bind-mount проекта. Так они
      # переживают редеплой контейнера и не оседают в ./www/cache.
      - php_runtime:/var/lib/bitrix-runtime
    environment:
      - APP_UID=${APP_UID:-1000}
      - APP_GID=${APP_GID:-1000}
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-512M}
      - PHP_MAX_EXECUTION_TIME=${PHP_MAX_EXECUTION_TIME:-300}
      - PHP_UPLOAD_MAX_FILESIZE=${PHP_UPLOAD_MAX_FILESIZE:-128M}
      - PHP_POST_MAX_SIZE=${PHP_POST_MAX_SIZE:-128M}
      - TZ=${TZ:-Europe/Moscow}
      # Xdebug (по умолчанию выключен, см. ./php/xdebug.ini)
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - XDEBUG_CLIENT_HOST=${XDEBUG_CLIENT_HOST:-host.docker.internal}
      - XDEBUG_CLIENT_PORT=${XDEBUG_CLIENT_PORT:-9003}
      - XDEBUG_START_WITH_REQUEST=${XDEBUG_START_WITH_REQUEST:-trigger}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bitrix-network

  # ---------- MySQL 8.0 ----------
  mysql:
    image: mysql:8.0
    # container_name убран: имя даёт Compose с префиксом проекта.
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb_buffer_pool_size=512M
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bitrix}
      MYSQL_USER: ${MYSQL_USER:-bitrix}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bitrix-network

  # ---------- Push-сервер Bitrix (Node.js)
  # Используем проверенный community-образ ikarpovich/bitrix-push-server,
  # который содержит оригинальный push-server от Bitrix Inc.
  # Требует Redis для координации между нодами (для одной ноды — факультативно,
  # но наличие Redis делает поведение предсказуемым).
  push-server:
    image: ikarpovich/bitrix-push-server:latest
    # container_name убран: имя даёт Compose с префиксом проекта.
    restart: unless-stopped
    environment:
      LISTEN_PORT: "8010"
      LISTEN_HOSTNAME: "0.0.0.0"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SECURITY_KEY: ${PUSH_SECURITY_KEY:-change_me_push_security_key_32_chars_min}
      MODE: pub
    depends_on:
      redis:
        condition: service_started
    networks:
      - bitrix-network

  # Подписчики (long-polling / WebSocket). Caddy проксирует /bitrix/sub* сюда.
  push-server-sub:
    image: ikarpovich/bitrix-push-server:latest
    restart: unless-stopped
    environment:
      LISTEN_PORT: "8011"
      LISTEN_HOSTNAME: "0.0.0.0"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SECURITY_KEY: ${PUSH_SECURITY_KEY:-change_me_push_security_key_32_chars_min}
      MODE: sub
    depends_on:
      redis:
        condition: service_started
    networks:
      - bitrix-network

  # ---------- Redis (для push-сервера) ----------
  redis:
    image: redis:7-alpine
    # container_name убран: имя даёт Compose с префиксом проекта.
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    networks:
      - bitrix-network

  # ---------- Adminer (GUI для БД) ----------
  adminer:
    image: adminer:latest
    # container_name убран: имя даёт Compose с префиксом проекта.
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      - mysql
    networks:
      - bitrix-network

  # ---------- MailHog (перехват почты) ----------
  mailhog:
    image: mailhog/mailhog:latest
    # container_name убран: имя даёт Compose с префиксом проекта.
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - bitrix-network
      
  # ---------- Init pull-module (одноразовая настройка) ----------
  # Применяет правильные настройки модуля pull в БД Битрикса:
  # nginx=Y, nginx_version=4, enable_protobuf=Y, signature_key=..., и т.д.
  # Без этого шага Битрикс будет считать, что push не настроен, и
  # отправлять события в никуда (а не в наш push-server). Скрипт
  # идемпотентный: при повторных запусках ничего не делает, если
  # настройки уже совпадают с ожидаемыми.
  #
  # Если нужно перевыставить после изменения .env:
  #   docker compose up pull-init
  # или
  #   docker compose restart pull-init
  pull-init:
    image: bitrix-php:8.3
    # pull_policy: build — переиспользует локально собранный php-сервисом
    # образ, а не пытается стянуть его из реестра.
    pull_policy: build
    depends_on:
      php:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: ${MYSQL_USER:-bitrix}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-bitrix}
      PUSH_SECURITY_KEY: ${PUSH_SECURITY_KEY}
      PULL_HTTP_PATH: http://caddy/bitrix/pub/
    volumes:
      - ./scripts/pull-init.php:/init.php:ro
    entrypoint: ["php", "/init.php"]
    networks:
      - bitrix-network
    restart: "on-failure"  # перезапускать только если exit != 0 (например, MySQL ещё не готов)

  # ---------- PostgreSQL (ОПЦИОНАЛЬНО, включается профилем) ----------
  # Раскомментируйте блок или используйте --profile postgres
  postgres:
    image: postgres:16-alpine
    # container_name убран: имя даёт Compose с префиксом проекта.
    restart: unless-stopped
    profiles: ["postgres"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bitrix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bitrixpass}
      POSTGRES_DB: ${POSTGRES_DB:-bitrix}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - bitrix-network

# =============================================================
# Networks
# =============================================================
networks:
  bitrix-network:
    driver: bridge
    # name: убран намеренно. Имя сети получает префикс проекта из
    # COMPOSE_PROJECT_NAME, иначе при втором стеке будет коллизия.
    # При желании можно переопределить здесь через переменную, но не нужно.

# =============================================================
# Volumes
# =============================================================
# name: убраны намеренно у всех volume. Compose автоматически даёт им имена
# вида <COMPOSE_PROJECT_NAME>_<имя_тома> (например bitrix_mysql_data).
# Это позволяет держать несколько стеков рядом с собственными данными.
volumes:
  mysql_data:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  php_runtime:
